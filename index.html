<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            JuicyHealthy - สุขภาพดีเริ่มจากทุกมื้อ Group5|DebugImpact5
        </title>

        <link
            href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f8f6f1;
            font-family: &quot;Kanit&quot;, sans-serif;
        "
    >
        <div id="root">
            <style>
                .sk-wrapper {
                    display: flex;
                    flex-direction: column;
                    min-height: 100vh;
                }
                .sk-nav {
                    height: 64px;
                    background: #fff;
                    border-bottom: 1px solid #ddd6c8;
                    display: flex;
                    align-items: center;
                    padding: 0 2rem;
                    justify-content: space-between;
                }
                .sk-pulse {
                    animation: pulse 1.5s infinite ease-in-out;
                    background: #ebe9e8;
                    border-radius: 4px;
                }
                .sk-logo {
                    width: 150px;
                    height: 32px;
                }
                .sk-menu {
                    display: flex;
                    gap: 20px;
                }
                .sk-menu-item {
                    width: 60px;
                    height: 20px;
                }
                .sk-hero {
                    padding: 4rem 2rem;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 1.5rem;
                }
                .sk-title {
                    width: 100%;
                    height: 60px;
                    border-radius: 4px;
                }
                .sk-subtitle {
                    width: 90%;
                    height: 24px;
                }

                @keyframes pulse {
                    0% {
                        opacity: 0.5;
                    }
                    50% {
                        opacity: 0.2;
                    }
                    100% {
                        opacity: 0.5;
                    }
                }
            </style>

            <div class="sk-wrapper">
                <div class="sk-nav">
                    <div class="sk-pulse sk-logo"></div>
                    <div class="sk-menu hidden sm:flex">
                        <div class="sk-pulse sk-menu-item"></div>
                        <div class="sk-pulse sk-menu-item"></div>
                        <div class="sk-pulse sk-menu-item"></div>
                    </div>
                </div>
                <div class="sk-hero">
                    <div class="sk-pulse sk-title"></div>
                    <div class="sk-pulse sk-subtitle"></div>
                    <div
                        class="sk-pulse sk-title"
                        style="
                            width: 100%;
                            height: 300px;
                            margin-top: 2rem;
                            border: 8px #ffffff solid;
                        "
                    ></div>
                </div>
            </div>
        </div>

        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
